volumes:
  qdrant_data:

networks:
  rag_network:
    driver: bridge

services:

  llama-chat:
    image: ghcr.io/ggml-org/llama.cpp:server${LLAMA_IMAGE_SUFFIX:-}
    container_name: llama-chat
    restart: unless-stopped
    networks:
      - rag_network
    volumes:
      - ./models:/models:ro
    ports:
      - "8080:8080"
    command: >
      -m /models/qwen3-8b-q4_k_m.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 32768
      -n -1
      -ngl ${GPU_LAYERS:-0}

  llama-embed:
    image: ghcr.io/ggml-org/llama.cpp:server${LLAMA_IMAGE_SUFFIX:-}
    container_name: llama-embed
    restart: unless-stopped
    networks:
      - rag_network
    volumes:
      - ./models:/models:ro
    ports:
      - "8081:8081"
    command: >
      -m /models/bge-m3-q4_k_m.gguf
      --host 0.0.0.0
      --port 8081
      --embedding
      -ngl ${GPU_LAYERS:-0}

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    networks:
      - rag_network
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      disable: true

  docs-api:
    image: python:3.12-slim-bookworm
    container_name: docs-api
    restart: unless-stopped
    networks:
      - rag_network
    volumes:
      - ./files/converted:/docs:ro
      - ./docs_server.py:/docs_server.py:ro
    command: python3 /docs_server.py
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000', timeout=2)\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: langgraph-agent
    restart: unless-stopped
    networks:
      - rag_network
    environment:
      LLM_URL: http://llama-chat:8080
      EMBED_URL: http://llama-embed:8081
      QDRANT_URL: http://qdrant:6333
      DOCS_API_URL: http://docs-api:8000
    depends_on:
      qdrant:
        condition: service_started
      docs-api:
        condition: service_healthy
      llama-chat:
        condition: service_started
      llama-embed:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent-frontend
    restart: unless-stopped
    networks:
      - rag_network
    depends_on:
      - agent

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    networks:
      - rag_network
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - agent
